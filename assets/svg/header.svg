<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;family=DM+Mono&amp;display=swap');

      .bg { fill: #0a0a0a; }
      .name-text {
        font-family: 'Space Grotesk', monospace;
        font-size: 64px;
        font-weight: 700;
        fill: #f0f0f0;
        letter-spacing: -2px;
      }
      .sub-text {
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        fill: #444444;
        letter-spacing: 4px;
      }
      .cursor {
        fill: #ff2d2d;
        animation: blink 0.8s step-end infinite;
      }
      .ghost-r {
        font-family: 'Space Grotesk', monospace;
        font-size: 64px;
        font-weight: 700;
        fill: #ff2d2d;
        letter-spacing: -2px;
        opacity: 0;
        animation: glitch-r 9s infinite;
      }
      .ghost-c {
        font-family: 'Space Grotesk', monospace;
        font-size: 64px;
        font-weight: 700;
        fill: #00ffcc;
        letter-spacing: -2px;
        opacity: 0;
        animation: glitch-c 9s infinite;
      }
      .border-top { stroke: #ff2d2d; animation: draw-line 1.2s ease 0.2s both; }
      .border-bot { stroke: #222222; animation: draw-line 1.2s ease 0.5s both; }
      .reveal { animation: fade-up 0.8s ease 0.3s both; }
      .reveal2 { animation: fade-up 0.8s ease 0.6s both; }
      .label-left { animation: fade-up 0.8s ease 0.8s both; }

      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes glitch-r {
        0%, 90%, 100% { opacity: 0; transform: translate(0,0); clip-path: none; }
        91% { opacity: 1; transform: translate(-5px, 0); clip-path: polygon(0 20%, 100% 20%, 100% 30%, 0 30%); }
        93% { opacity: 1; transform: translate(5px, 0); clip-path: polygon(0 55%, 100% 55%, 100% 65%, 0 65%); }
        95% { opacity: 1; transform: translate(-3px, 0); clip-path: polygon(0 40%, 100% 40%, 100% 45%, 0 45%); }
        97% { opacity: 0; }
      }
      @keyframes glitch-c {
        0%, 92%, 100% { opacity: 0; transform: translate(0,0); clip-path: none; }
        93% { opacity: 1; transform: translate(6px, 0); clip-path: polygon(0 30%, 100% 30%, 100% 38%, 0 38%); }
        95% { opacity: 1; transform: translate(-4px, 0); clip-path: polygon(0 65%, 100% 65%, 100% 72%, 0 72%); }
        97% { opacity: 0; }
      }
      @keyframes draw-line {
        from { stroke-dashoffset: 800; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <rect width="800" height="160" class="bg"/>

  <line x1="0" y1="1" x2="800" y2="1" stroke-width="1" stroke-dasharray="800" class="border-top"/>
  <line x1="0" y1="159" x2="800" y2="159" stroke-width="1" stroke-dasharray="800" class="border-bot"/>

  <g class="reveal">
    <text x="32" y="100" class="name-text">SAYUDHA</text>
    <text x="32" y="100" class="ghost-r">SAYUDHA</text>
    <text x="32" y="100" class="ghost-c">SAYUDHA</text>
    <rect x="448" y="60" width="4" height="52" class="cursor"/>
  </g>

  <g class="reveal2">
    <text x="32" y="128" class="sub-text">FULL-STACK DEVELOPER  /  CREATIVE CODER  /  BANDUNG, INDONESIA</text>
  </g>

  <g class="label-left">
    <text x="768" y="100" class="sub-text" text-anchor="end" fill="#ff2d2d">MAZAYA.STUDIO</text>
  </g>
</svg>
