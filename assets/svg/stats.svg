<svg width="800" height="100" viewBox="0 0 800 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0a0a0a; }
      .cell { fill: #0d0d0d; }
      .cell-accent { fill: #0d0d0d; }
      .accent-line { fill: #ff2d2d; animation: scale-in 0.8s ease both; transform-origin: left; }
      .stat-n {
        font-family: 'Space Grotesk', 'Arial Black', monospace;
        font-size: 36px;
        font-weight: 700;
        fill: #f0f0f0;
      }
      .stat-n-accent { fill: #ff2d2d; }
      .stat-l {
        font-family: 'DM Mono', 'Courier New', monospace;
        font-size: 9px;
        fill: #333333;
        letter-spacing: 3px;
      }
      .avail-dot {
        fill: #00ffcc;
        animation: pulse 2s ease-in-out infinite;
      }
      .avail-text {
        font-family: 'DM Mono', 'Courier New', monospace;
        font-size: 9px;
        fill: #00ffcc;
        letter-spacing: 3px;
      }
      .divider { stroke: #111111; }
      .cell-a { animation: fade-up 0.6s ease 0.2s both; }
      .cell-b { animation: fade-up 0.6s ease 0.35s both; }
      .cell-c { animation: fade-up 0.6s ease 0.5s both; }

      @keyframes pulse {
        0%, 100% { opacity: 1; r: 4; }
        50%       { opacity: 0.3; r: 3; }
      }
      @keyframes scale-in {
        from { transform: scaleX(0); }
        to   { transform: scaleX(1); }
      }
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <rect width="800" height="100" class="bg"/>

  <!-- Cell 1: Years -->
  <rect x="0"   y="0" width="196" height="100" class="cell"/>
  <rect x="0"   y="0" width="196" height="2"   class="accent-line"/>
  <g class="cell-a">
    <text x="24" y="52" class="stat-n">7<tspan class="stat-n-accent">+</tspan></text>
    <text x="24" y="74" class="stat-l">YEARS ACTIVE</text>
  </g>

  <!-- Divider -->
  <line x1="197" y1="0" x2="197" y2="100" stroke-width="1" class="divider"/>

  <!-- Cell 2: Stack -->
  <rect x="198" y="0" width="196" height="100" class="cell"/>
  <rect x="198" y="0" width="196" height="2"   class="accent-line"/>
  <g class="cell-b">
    <text x="222" y="52" class="stat-n">15<tspan class="stat-n-accent">+</tspan></text>
    <text x="222" y="74" class="stat-l">TECH STACK</text>
  </g>

  <!-- Divider -->
  <line x1="395" y1="0" x2="395" y2="100" stroke-width="1" class="divider"/>

  <!-- Cell 3: Status wide -->
  <rect x="396" y="0" width="404" height="100" class="cell"/>
  <g class="cell-c">
    <circle cx="424" cy="44" r="4" class="avail-dot"/>
    <text x="440" y="48" class="avail-text">OPEN TO WORK</text>
    <text x="424" y="72" class="stat-l">FREELANCE  /  FULLTIME  /  COLLABORATION</text>
  </g>
</svg>
